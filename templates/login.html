{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container" style="padding-top:2.5rem">
  <div class="form-card">
    <div style="text-align:center;margin-bottom:1.8rem">
      <div style="font-size:2.2rem;margin-bottom:.4rem">🔐</div>
      <h1 style="font-family:var(--display);font-size:1.7rem;font-weight:800">Welcome Back</h1>
      <p style="color:var(--muted);font-size:.88rem">Login to access your purchased projects</p>
    </div>
    <form method="POST" action="{{ url_for('login',next=next) }}">
      <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="you@email.com" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Your password" required></div>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>
    <p style="text-align:center;margin-top:1.3rem;color:var(--muted);font-size:.88rem">No account? <a href="{{ url_for('register') }}" style="color:var(--accent)">Sign up free</a></p>
  </div>
</div>
{% endblock %}
