{% extends 'base.html' %}
{% block title %}Create Account{% endblock %}
{% block content %}
<div class="container" style="padding-top:2.5rem">
  <div class="form-card">
    <div style="text-align:center;margin-bottom:1.8rem">
      <div style="font-size:2.2rem;margin-bottom:.4rem">👤</div>
      <h1 style="font-family:var(--display);font-size:1.7rem;font-weight:800">Create Account</h1>
      <p style="color:var(--muted);font-size:.88rem">Join PyMarket and access premium Python projects</p>
    </div>
    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group"><label>Username</label><input type="text" name="username" placeholder="cooldev123" required></div>
      <div class="form-group"><label>Email</label><input type="email" name="email" placeholder="you@email.com" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Min. 6 characters" required></div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>
    <p style="text-align:center;margin-top:1.3rem;color:var(--muted);font-size:.88rem">Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent)">Login</a></p>
  </div>
</div>
{% endblock %}
